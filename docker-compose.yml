services:
  skycom-crewai:
    build: .
    container_name: skycom-crewai
    env_file: .env
    volumes:
      - .:/app
      - ./skycom:/app/skycom
    environment:
      - CREWAI_TRACING_ENABLED=false
      - OTEL_SDK_DISABLED=true
      - PYTHONUNBUFFERED=1
    # Thêm 2 dòng này để giả lập bàn phím (nếu cần)
    stdin_open: true
    tty: true

volumes:
  ollama_data: